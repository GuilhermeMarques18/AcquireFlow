version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: acquisitions-app:${APP_VERSION:-latest}
    container_name: acquisitions-app-prod
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3000}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
      
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - acquireflow-prod

networks:
  acquireflow-prod:
    driver: bridge